name: Supabase Keepalive

on:
  schedule:
    # Cada 2 días a las 03:00 UTC
    - cron: '0 3 */2 * *'
  # Permite forzar la ejecución manual desde la web de GitHub
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar SELECT básico a Supabase
        env:
          # Aquí lee las variables seguras que configures en GitHub Secrets
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          curl -fsS "${SUPABASE_URL}/rest/v1/Ayuntamiento?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Accept: application/json"